services:
  - type: web
    name: ebay-lister-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: USE_GOOGLE_LENS
        value: "true"
      - key: USE_REAL_EBAY
        value: "true"
      - key: ALLOW_MOCK_FALLBACK
        value: "true"
      - key: CACHE_TTL_HOURS
        value: "24"
      - key: BACKEND_API_TOKEN
        sync: false
      - key: SERPAPI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-1.5-flash
      - key: EBAY_CLIENT_ID
        sync: false
      - key: EBAY_CLIENT_SECRET
        sync: false
      - key: EBAY_REFRESH_TOKEN
        sync: false
